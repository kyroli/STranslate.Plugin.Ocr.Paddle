name: Build and Package Plugin

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build and Package
        shell: pwsh
        run: |
          dotnet build "STranslate.Plugin.Ocr.Paddle/STranslate.Plugin.Ocr.Paddle.csproj" --configuration Release --no-incremental --force

      - name: Update Latest Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f v1.0.7-latest
          git push origin v1.0.7-latest --force

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: STranslate.Plugin.Ocr.Paddle
          path: .artifacts/plugins/*.spkg

      - name: Release Plugin
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.0.7-latest' }}
          target_commitish: ${{ github.sha }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Auto-Build' }}
          body: |
            This is an automatic build of the latest main branch.
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          files: |
            .artifacts/plugins/*.spkg
